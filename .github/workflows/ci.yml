name: Native CI-CD to Nexus

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: maven

      - name: Build with Maven
        # Uses the wrapper you just restored to build the .war
        run: ./mvnw clean package -DskipTests

      - name: Deploy to Native Nexus
        # Uses the wrapper to push to your Native Nexus at localhost:8081
        run: ./mvnw deploy -DskipTests