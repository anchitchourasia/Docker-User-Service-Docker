name: Spring Boot CI-CD to Local Nexus

on:
  push:
    branches: [ "main" ] # Triggers on every push to the main branch

jobs:
  build-and-deploy:
    # CRITICAL: Use 'self-hosted' to run this on your local PC
    runs-on: self-hosted 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Speeds up builds by caching dependencies

      - name: Build with Maven
        # This replaces your Jenkins 'Build' stage
        run: mvn clean package -DskipTests

      - name: Deploy to Native Nexus
        # This sends your 0.0.1-SNAPSHOT to your local Nexus
        # Ensure your local settings.xml has the correct credentials
        run: mvn deploy -DskipTests