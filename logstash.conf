# Remove everything and start fresh
rm -rf ~/logstash-docker

# Create proper directory structure
mkdir -p ~/logstash-docker/pipeline

# Create the config file correctly
cat > ~/logstash-docker/pipeline/logstash.conf << 'EOF'
input {
  tcp {
    port => 5045
    codec => json_lines
  }
}

output {
  elasticsearch {
    hosts => ["http://172.24.204.45:9200"]
    index => "user-service-logs-%{+yyyy.MM.dd}"
  }
  stdout { codec => rubydebug }
}
EOF